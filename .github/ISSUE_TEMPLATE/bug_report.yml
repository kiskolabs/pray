name: Bug Report
description: Report a bug in the pata reference implementation or conformance fixtures.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please verify version, OS, and steps. Do **not** paste secrets, API keys, or private agent context from production repositories.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Command or action…
        2. …
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, `pata`/commit or version, and toolchain version if relevant.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report includes no secrets, tokens, or unrelated personal data.
          required: true
