name: Specification Feedback
description: Propose a change or clarification to SPEC.md.
title: "[Spec]: "
labels: ["spec", "triage"]
body:
  - type: markdown
    attributes:
      value: "Please ensure your reporting is accurate and balanced. Verify details before submitting."
  - type: textarea
    id: section
    attributes:
      label: SPEC.md Section or Topic
      description: Cite the relevant section when possible.
      placeholder: e.g. lockfile hashing, render targets, distribution point API
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is unclear, inconsistent, or missing? Be specific and avoid generalizations.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Wording or Behavior
      description: Optional preferred clarification or behavior.
    validations:
      required: false
  - type: checkboxes
    id: automation_check
    attributes:
      label: Automation Safety
      options:
        - label: I certify that this report does not contain private keys or PII (Security Measures).
          required: true
