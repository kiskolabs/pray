name: Feature Request
description: Create a request to help us improve.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: "Please ensure your reporting is accurate and balanced. Verify details before submitting."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What problem are you solving? Be specific and avoid generalizations.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Approach
      description: Optional preferred solution or direction.
    validations:
      required: false
  - type: checkboxes
    id: automation_check
    attributes:
      label: Automation Safety
      options:
        - label: I certify that this report does not contain private keys or PII (Security Measures).
          required: true
